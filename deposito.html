<div class="text-center mt-3">
    <button onclick="salvarEstoque()" class="btn btn-warning">Salvar Estoque</button>

<!-- --------------------------------------------  JavaScript  -------------------------------------------- -->


<script>
    function salvarEstoque(){
        // --------------------------------------------  CONGELADOS JC  -------------------------------------------- //
        const lagarto = document.getElementById('qtde-lagarto').value;
        const filet = document.getElementById('qtde-filet').value;
        const frango = document.getElementById('qtde-frango').value;
        const coxa = document.getElementById('qtde-coxa').value;
        const salmao = document.getElementById('qtde-salmao').value;
        const picanha = document.getElementById('qtde-picanha').value;
        // --------------------------------------------  CONGELADOS JC  -------------------------------------------- //
        localStorage.setItem('estoque-lagarto', lagarto);
        localStorage.setItem('estoque-filet', filet);
        localStorage.setItem('estoque-frango', frango);
        localStorage.setItem('estoque-coxa', coxa);
        localStorage.setItem('estoque-salmao', salmao);
        localStorage.setItem('estoque-picanha', picanha);

        alert("Estoque do Yellow Giraffe atualizado com sucesso");
    }

window.onload = function(){
    // --------------------------------------------  CONGELADOS JC  -------------------------------------------- //
    const lagartoSalvo = localStorage.getItem('estoque-lagarto');
    const filetSalvo = localStorage.getItem('estoque-filet');
    const frangoSalvo = localStorage.getItem('estoque-frango');
    const coxaSalvo = localStorage.getItem('estoque-coxa');
    const salmaoSalvo = localStorage.getItem('estoque-salmao');
    const picanhaSalvo = localStorage.getItem('estoque-picanha');

    // --------------------------------------------  CONGELADOS JC  -------------------------------------------- //
    if (lagartoSalvo !== null){
        document.getElementById('qtde-lagarto').value = lagartoSalvo;
    }
    if (filetSalvo !== null){
        document.getElementById('qtde-filet').value = filetSalvo;
    }
    if (frangoSalvo !== null){
        document.getElementById('qtde-frango').value = frangoSalvo;
    }
    if (coxaSalvo !== null){
        document.getElementById('qtde-coxa').value = coxaSalvo;
    }
    if (salmaoSalvo !== null){
        document.getElementById('qtde-salmao').value = salmaoSalvo;
    }
    if (picanhaSalvo !== null){
        document.getElementById('qtde-picanha').value = picanhaSalvo;
    }
}
</script>
